<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鮮蔬家園 - 在地有機優質農產團購網</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #8BC34A;
            --text-color: #333;
            --bg-color: #f9f9f9;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* 導覽列樣式設定 */
        header {
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            color: #666;
            font-weight: 500;
            transition: color 0.3s;
            cursor: pointer;
        }

        .nav-links li a:hover {
            color: var(--primary-color);
        }

        /* 團購首頁產品橫幅 */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1610348725531-843dff563e2c?auto=format&fit=crop&q=80&w=1200') no-repeat center/cover;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }

        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
            color: #388E3C;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .card-img {
            height: 200px;
            background-size: cover;
            background-position: center;
        }

        .card-body { padding: 20px; }
        .card-title { font-size: 18px; margin: 0 0 10px 0; font-weight: bold; }
        .price { color: #E65100; font-weight: bold; font-size: 20px; }

        /* 彈出視窗基礎樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        /* 契作會員登入界面 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover { background: #388E3C; }

        /* 物流通訊面板專屬樣式 */
        .chat-box {
            max-width: 600px;
        }
        .chat-section {
            margin-bottom: 25px;
        }
        .chat-label {
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer-badge {
            background: #ffebee;
            color: #c62828;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .message-display {
            background: #f1f8e9;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            min-height: 60px;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .message-display.burned {
            background: #ffebee;
            border-left: 4px solid #ef5350;
            color: #c62828;
            font-style: italic;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <div class="nav-container">
            <a class="logo" href="#">🥬 鮮蔬家園</a>
            <ul class="nav-links">
                <li><a href="#">首頁</a></li>
                <li><a href="#">最新消息</a></li>
                <li><a href="#">當季團購</a></li>
                <li><a href="#">小農故事</a></li>
                <li><a id="secretEntry">聯絡我們</a></li>
            </ul>
        </div>
    </header>

    <div class="hero">
        <h1>產地直送的純粹感動</h1>
        <p>契作無毒有機蔬菜，每週三固定配送，為家人的健康把關</p>
    </div>

    <main class="main-content">
        <h2 class="section-title">本週推薦團購項目</h2>
        <div class="grid">
            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1574316071802-0d684efa7bf5?auto=format&fit=crop&q=80&w=400')"></div>
                <div class="card-body">
                    <div class="card-title">有機高山高麗菜 (顆)</div>
                    <div class="price">$120</div>
                </div>
            </div>
            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1592417817098-8f3d6eb19675?auto=format&fit=crop&q=80&w=400')"></div>
                <div class="card-body">
                    <div class="card-title">溫室無毒小黃瓜 (600g)</div>
                    <div class="price">$85</div>
                </div>
            </div>
            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1598170845058-32b996a67f2c?auto=format&fit=crop&q=80&w=400')"></div>
                <div class="card-body">
                    <div class="card-title">產地嚴選優質胡蘿蔔 (袋)</div>
                    <div class="price">$60</div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-box">
            <span class="close-btn" id="closeLogin">&times;</span>
            <h3 style="margin-top:0; color:var(--primary-color);">特約企業大宗採購登入</h3>
            <p style="font-size:14px; color:#666;">本專區僅限已簽約之合作企業、餐廳與大宗採購業主進入，非相關合作單位請勿輸入。</p>
            
            <div class="form-group">
                <label>合作夥伴授權碼 (或註冊手機)</label>
                <input type="text" id="memberId" class="form-control" placeholder="請輸入 10 碼授權檢查碼" autocomplete="new-password">
            </div>
            <button class="btn" id="submitLogin">驗證身份</button>
        </div>
    </div>

    <div class="modal-overlay" id="cryptoModal">
        <div class="modal-box chat-box">
            <span class="close-btn" id="closeCrypto">&times;</span>
            <h3 style="margin-top:0; border-bottom: 2px solid #eee; padding-bottom:10px;" id="userTitle">系統後端</h3>
            
            <div class="chat-section">
                <div class="chat-label">
                    <span>來自對方的留言</span>
                    <span class="timer-badge" id="timerDisplay">等待載入...</span>
                </div>
                <div id="incomingMessage" class="message-display">
                    遠端連線中...
                </div>
            </div>

            <div class="chat-section" style="border-top: 1px dashed #ccc; padding-top:20px;">
                <div class="chat-label">留給對方的訊息</div>
                <textarea id="outgoingMessage" class="form-control" rows="3" placeholder="請輸入您想留給對方的訊息..." autocomplete="new-password" style="resize: none;"></textarea>
            </div>
            <button class="btn" id="sendMessageBtn">安全送出並登出</button>
        </div>
    </div>

    <script>
        // 請填入您從 Firebase 申請到的項目金鑰設定
        const firebaseConfig = {
            apiKey: "AIzaSyCMU2S5g2COj8iRF0fUqXOGkrJh61rHwEk",
            authDomain: "vegt-189cd.firebaseapp.com",
            databaseURL: "https://vegt-189cd-default-rtdb.firebaseio.com",
            projectId: "vegt-189cd",
            storageBucket: "vegt-189cd.firebasestorage.app",
            messagingSenderId: "330815978249",
            appId: "1:330815978249:web:206907aea614db6bf171d8"
        };
        
        // 初始化整合服務
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentActiveUser = null; 
        let countdownInterval = null;

        // 物流分區指紋設定值
        const VENDOR_CODE_NORTH = "ece7408f65e236319f6a75a034237f3a8b417bdf7581552cf34d8520775d713c"; 
        const VENDOR_CODE_SOUTH = "19be4713a89a07106093fb23d916cb0b7a08b9829aa08bf6d6df5df79b7194f4"; 

        // 資料庫路徑指紋
        const PATH_NORTH = "ece7408f"; 
        const PATH_SOUTH = "19be4713";

        // 動態資料編碼轉換器
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // DOM 元素選取
        const secretEntry = document.getElementById('secretEntry');
        const loginModal = document.getElementById('loginModal');
        const cryptoModal = document.getElementById('cryptoModal');
        const closeLogin = document.getElementById('closeLogin');
        const closeCrypto = document.getElementById('closeCrypto');
        const submitLogin = document.getElementById('submitLogin');
        const memberIdInput = document.getElementById('memberId');
        const userTitle = document.getElementById('userTitle');
        const incomingMessage = document.getElementById('incomingMessage');
        const timerDisplay = document.getElementById('timerDisplay');
        const outgoingMessage = document.getElementById('outgoingMessage');
        const sendMessageBtn = document.getElementById('sendMessageBtn');

        // 初始化驗證視窗
        secretEntry.addEventListener('click', () => {
            memberIdInput.value = ""; 
            loginModal.classList.add('active');
        });

        // 卸載處理邏輯
        closeLogin.addEventListener('click', () => loginModal.classList.remove('active'));
        closeCrypto.addEventListener('click', () => {
            clearInterval(countdownInterval);
            cryptoModal.classList.remove('active');
            clearSensitiveData();
        });

        // 身分身分比對流程
        submitLogin.addEventListener('click', async () => {
            const inputVal = memberIdInput.value.trim();
            const inputHash = await sha256(inputVal); 
            
            if (inputHash === VENDOR_CODE_NORTH) {
                currentActiveUser = PATH_NORTH; 
                loginModal.classList.remove('active');
                openCryptoPanel(PATH_NORTH);
            } else if (inputHash === VENDOR_CODE_SOUTH) {
                currentActiveUser = PATH_SOUTH;
                loginModal.classList.remove('active');
                openCryptoPanel(PATH_SOUTH);
            } else {
                alert('錯誤 (Error 403)：您的帳號未包含大宗採購授權，或該授權已過期。請聯絡採購部門窗口協助。');
                memberIdInput.value = ""; 
            }
        });

        // 呼叫雲端數據載入
        function openCryptoPanel(userPath) {
            cryptoModal.classList.add('active');
            outgoingMessage.value = ""; 
            
            let targetMsgKey = (userPath === PATH_NORTH) ? PATH_SOUTH : PATH_NORTH;
            userTitle.innerText = "特約通道：大宗物資管理專區"; 

            database.ref('messages/' + targetMsgKey).once('value').then((snapshot) => {
                const listData = snapshot.val();
                
                if (listData) {
                    const msgArray = Object.values(listData).sort((a, b) => a.timestamp - b.timestamp);
                    const combinedText = msgArray.map(item => item.text).join('\n\n');
                    
                    incomingMessage.innerText = combinedText;
                    incomingMessage.classList.remove('burned');
                    startBurnTimer(targetMsgKey);
                } else {
                    incomingMessage.innerText = "目前系統無待處理之大宗訂單或備註事項。"; 
                    incomingMessage.classList.add('burned');
                    timerDisplay.innerText = "無通訊內容";
                }
            }).catch((error) => {
                incomingMessage.innerText = "連線失敗，請檢查網路。";
            });
        }

        // 數據緩衝生存週期管理 (10 秒)
        function startBurnTimer(msgKey) {
            let timeLeft = 10;
            timerDisplay.innerText = `剩餘時間: ${timeLeft}秒`;

            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    timerDisplay.innerText = `剩餘時間: ${timeLeft}秒`;
                } else {
                    clearInterval(countdownInterval);
                    
                    // 執行伺服器同步移除指令
                    database.ref('messages/' + msgKey).remove();
                    
                    incomingMessage.innerText = "【系統提示】基於資安合規性，大宗採購暫存資料已於 10 秒前過期並自動永久銷毀。"; 
                    incomingMessage.classList.add('burned');
                    timerDisplay.innerText = "資料已過期銷毀";
                    
                    msgKey = null;
                }
            }, 1000);
        }

        // 傳輸本地排程變更至雲端
        sendMessageBtn.addEventListener('click', () => {
            const newMsg = outgoingMessage.value.trim();
            if (!newMsg) {
                alert('請輸入留言內容');
                return;
            }

            database.ref('messages/' + currentActiveUser).push({
                text: newMsg,
                timestamp: Date.now()
            }).then(() => {
                alert('備註事項已成功加密回傳至管理系統。'); 
                clearInterval(countdownInterval);
                cryptoModal.classList.remove('active');
                clearSensitiveData();
            }).catch((err) => {
                alert('傳輸失敗，請檢查連線。');
            });
        });

        // 執行記憶體快取清理
        function clearSensitiveData() {
            currentActiveUser = null;
            memberIdInput.value = "";
            outgoingMessage.value = "";
            incomingMessage.innerText = "";
        }
    </script>
</body>
</html>
